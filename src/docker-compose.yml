version: '3.4'
services:
    jb-dotnet-build:
        container_name: jb-dotnet-build
        scale: 0
        build:
            context: .
            dockerfile: ./dotnet-build.Dockerfile
    web:
        container_name: web
        build:
            context: .
            dockerfile: ./WorkBC.Web/Dockerfile
            args:
                COMMIT_SHA: ${COMMIT_SHA}
                RUN_NUMBER: ${RUN_NUMBER}
                BUILD_DATE: ${BUILD_DATE}
        ports:
            - "8081:8081"
        environment:
            - ASPNETCORE_URLS=http://*:8081
            - ASPNETCORE_ENVIRONMENT=Development
        env_file:
            - .env
    admin:
        build:
            context: .
            dockerfile: ./WorkBC.Admin/Dockerfile
        ports:
            - "8080:8080"
        environment:
            - ASPNETCORE_URLS=http://*:8080
            - ASPNETCORE_ENVIRONMENT=Development
        env_file:
            - .env
    importers-innovibe:
        container_name: importers-innovibe
        scale: 0
        build:
            context: ./WorkBC.Importers.Innovibe
            dockerfile: Dockerfile
        env_file:
            - .env
        environment:
            - DB_HOST=postgres
            - DB_NAME=jobboard
    importers-innovibe-cli:
        container_name: importers-innovibe-cli
        build:
            context: ./WorkBC.Importers.Innovibe
            dockerfile: Dockerfile.cli
        env_file:
            - .env
        environment:
            - DB_HOST=postgres
            - DB_NAME=jobboard
    importers-federal:
        container_name: importers-federal
        scale: 0
        build:
            context: .
            dockerfile: ./WorkBC.Importers.Federal/Dockerfile
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
        env_file:
            - .env
    # New PHP rewrite of the federal importer. Runs alongside the legacy C#
    # `importers-federal` service so the cluster can transition gradually.
    # When the legacy project is retired, swap the cron-job image and remove
    # the legacy service.
    importers-federal-v2:
        container_name: importers-federal-v2
        scale: 0
        build:
            context: ./WorkBC.Importers.Federal.V2
            dockerfile: Dockerfile
        env_file:
            - .env
        environment:
            - DB_HOST=postgres
            - DB_NAME=jobboard
    importers-federal-v2-cli:
        container_name: importers-federal-v2-cli
        build:
            context: ./WorkBC.Importers.Federal.V2
            dockerfile: Dockerfile.cli
        env_file:
            - .env
        environment:
            - DB_HOST=postgres
            - DB_NAME=jobboard
    indexers-federal:
        container_name: indexers-federal
        scale: 0
        build:
            context: .
            dockerfile: ./WorkBC.Indexers.Federal/Dockerfile
        env_file:
            - .env
    indexers-wanted:
        container_name: indexers-wanted
        scale: 0
        build:
            context: .
            dockerfile: ./WorkBC.Indexers.Wanted/Dockerfile
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
        env_file:
            - .env
    notifications-job-alerts:
        container_name: notifications-job-alerts
        scale: 0
        build:
            context: .
            dockerfile: ./WorkBC.Notifications.JobAlerts/Dockerfile
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
        env_file:
            - .env
    migration-runner:
        container_name: migration-runner
        scale: 0
        build:
            context: .
            dockerfile: ./EFMigrationRunner/Dockerfile
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
        env_file:
            - .env
    dotnet-cli:
        container_name: dotnet-cli
        build:
            context: .
            dockerfile: ./dotnet-cli.Dockerfile
        env_file:
            - .env